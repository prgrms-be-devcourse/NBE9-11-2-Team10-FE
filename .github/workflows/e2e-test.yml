name: E2E Tests

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        # 🔽 1. 환경변수 영구 주입
      - name: Export environment variables to $GITHUB_ENV
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}" >> $GITHUB_ENV
          echo "API_BASE_URL=${{ vars.API_BASE_URL }}" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV

      - name: Export environment variables
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}" >> $GITHUB_ENV
          echo "API_BASE_URL=${{ vars.API_BASE_URL }}" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV

      # 🔽 .env.test 파일 생성 (들여쓰기 주의: |- 사용)
      - name: Create .env.test for Next.js
        run: |-
          cat << EOF > .env.test
          NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
          API_BASE_URL=${{ vars.API_BASE_URL }}
          NODE_ENV=test
          EOF

      - name: Debug .env.test content
        run: |
          echo "=== .env.test 파일 내용 (공백 확인용) ==="
          cat -A .env.test  # -A 옵션: 공백/탭/개행문자 표시
          echo "=== 변수 값 확인 ==="
          grep NEXT_PUBLIC .env.test

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: bash scripts/run-e2e.sh
        env:
          CI: true
          PORT: 3000
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          NODE_ENV: test

      - name: Upload Playwright report (실패 시)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Comment PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'test-results/results.json';

            if (!fs.existsSync(path)) {
              core.warning('⚠️ results.json 이 생성되지 않았습니다.');
              return;
            }

            // ✅ pull_request 번호 안전하게 접근
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.info('ℹ️ PR 이벤트가 아니므로 댓글 작성을 건너뜁니다.');
              return;
            }

            const data = JSON.parse(fs.readFileSync(path, 'utf8'));

            // Playwright JSON 구조에서 카운트 추출
            let passed = 0, failed = 0, skipped = 0;
            function countOutcomes(suites) {
              for (const suite of suites) {
                if (suite.specs) {
                  for (const spec of suite.specs) {
                    for (const test of spec.tests) {
                      const outcome = test.outcome || test.status;
                      if (outcome === 'expected') passed++;
                      else if (outcome === 'unexpected') failed++;
                      else if (outcome === 'skipped') skipped++;
                    }
                  }
                }
                if (suite.suites) countOutcomes(suite.suites);
              }
            }
            countOutcomes(data.suites || []);

            const body = `### 🧪 E2E Test Results
            | Status | Count |
            |--------|-------|
            | ✅ Passed | ${passed} |
            | ❌ Failed | ${failed} |
            | ⏭️ Skipped | ${skipped} |

            ${failed > 0 ? '🔍 [HTML Report 다운로드](#artifacts) 에서 상세 로그를 확인하세요.' : '🎉 All tests passed!'}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });
